<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações Gourmet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <div class="auth-section" id="authSection">
                <button id="wakeServerBtnAuth" class="btn btn-primary">Iniciar Servidor</button>
                <div class="auth-buttons">
                    <button id="loginBtn" class="btn btn-primary">Entrar</button>
                    <button id="registerBtn" class="btn btn-secondary">Cadastrar</button>
                </div>
            </div>
            <div class="user-section hidden" id="userSection">
                <button id="wakeServerBtnUser" class="btn btn-primary">Iniciar Servidor</button>
                <div class="user-info">
                    <span id="userName"></span>
                    <button id="logoutBtn" class="btn btn-secondary">Sair</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-title">
                <div class="header-subtitle">Comida Boa</div>
                <h1>Avaliações<br>Gourmet</h1>
                <div class="header-stars">★ ★ ★ ★ ★</div>
            </div>
        </header>

        <!-- Auth Modal -->
        <div id="authModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="authTitle">Entrar</h2>
                <form id="authForm">
                    <input type="text" id="authName" placeholder="Nome" class="hidden">
                    <input type="email" id="authEmail" placeholder="Email" required>
                    <input type="password" id="authPassword" placeholder="Senha" required>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </form>
                <p id="authError" class="error hidden"></p>
            </div>
        </div>

        <!-- Restaurant List -->
        <section id="restaurantList" class="restaurant-list hidden">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Buscar restaurante..." />
            </div>
            <div class="section-header">
                <h2>Restaurantes</h2>
                <button id="addRestaurantBtn" class="btn btn-primary">Adicionar Restaurante</button>
            </div>
            <div id="restaurants" class="cards-container"></div>
        </section>

        <!-- Review Modal -->
        <div id="reviewModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Avaliar <span id="reviewRestaurantName"></span></h2>
                <form id="reviewForm">
                    <input type="hidden" id="reviewRestaurantId">
                    <input type="hidden" id="reviewId" value="">

                    <div class="rating-group">
                        <label>Qualidade da Comida (40%)</label>
                        <div class="rating-slider">
                            <input type="range" id="foodRating" min="1" max="10" step="1" value="5">
                            <span class="rating-value">5</span>
                        </div>
                    </div>

                    <div class="rating-group">
                        <label>Atendimento (20%)</label>
                        <div class="rating-slider">
                            <input type="range" id="serviceRating" min="1" max="10" step="1" value="5">
                            <span class="rating-value">5</span>
                        </div>
                    </div>

                    <div class="rating-group">
                        <label>Ambiente (15%)</label>
                        <div class="rating-slider">
                            <input type="range" id="atmosphereRating" min="1" max="10" step="1" value="5">
                            <span class="rating-value">5</span>
                        </div>
                    </div>

                    <div class="rating-group">
                        <label>Custo-Benefício (15%)</label>
                        <div class="rating-slider">
                            <input type="range" id="priceRating" min="1" max="10" step="1" value="5">
                            <span class="rating-value">5</span>
                        </div>
                    </div>

                    <div class="rating-group">
                        <label>Tempo de Espera (5%)</label>
                        <div class="rating-slider">
                            <input type="range" id="waitTimeRating" min="1" max="10" step="1" value="5">
                            <span class="rating-value">5</span>
                        </div>
                    </div>

                    <div class="rating-group">
                        <label>Localização e Acesso (5%)</label>
                        <div class="rating-slider">
                            <input type="range" id="locationRating" min="1" max="10" step="1" value="5">
                            <span class="rating-value">5</span>
                        </div>
                    </div>

                    <div class="comments-group">
                        <label for="reviewComments">Comentários (opcional)</label>
                        <textarea id="reviewComments" placeholder="Compartilhe sua experiência..." rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Enviar Avaliação</button>
                </form>
                <p id="reviewError" class="error hidden"></p>
            </div>
        </div>

        <!-- Reviews List Modal -->
        <div id="reviewsModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Avaliações de <span id="reviewsRestaurantName"></span></h2>
                <div id="reviewsList"></div>
            </div>
        </div>

        <!-- Add Restaurant Modal -->
        <div id="addRestaurantModal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="addRestaurantTitle">Adicionar Restaurante</h2>
                <form id="addRestaurantForm">
                    <input type="hidden" id="restaurantId" value="">
                    <input type="hidden" id="currentRestaurantImage" value="">
                    <div id="restaurantNameDisplay" class="restaurant-name-display hidden"></div>
                    <input type="text" id="restaurantName" placeholder="Nome do Restaurante" required>
                    <input type="text" id="restaurantLocation" placeholder="Localização" required>
                    <textarea id="restaurantDescription" placeholder="Descrição" rows="3" required></textarea>

                    <div class="image-upload">
                        <label for="restaurantImage" class="image-label">Imagem do Restaurante</label>
                        <input type="file" id="restaurantImage" accept="image/*">
                        <div id="imagePreview" class="image-preview hidden">
                            <img id="previewImg" src="" alt="Preview">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="restaurantSubmitBtn">Adicionar</button>
                </form>
                <p id="addRestaurantError" class="error hidden"></p>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="deleteConfirmModal" class="modal hidden">
            <div class="modal-content modal-small">
                <h2>⚠️ Confirmar Exclusão</h2>
                <p id="deleteConfirmText" class="confirm-text"></p>
                <div class="confirm-actions">
                    <button id="cancelDeleteBtn" class="btn btn-secondary">Cancelar</button>
                    <button id="confirmDeleteBtn" class="btn btn-danger">Deletar</button>
                </div>
            </div>
        </div>

        <!-- Server Wake Modal -->
        <div id="serverWakeModal" class="modal hidden">
            <div class="modal-content modal-small">
                <h2 id="serverWakeTitle">Iniciando Servidor</h2>
                <div class="wake-loader">
                    <div class="spinner" id="serverSpinner"></div>
                    <p id="serverWakeMessage">Aguarde, o servidor está inicializando...</p>
                    <p class="wake-subtext" id="serverWakeSubtext">Isso pode levar até 1 minuto.</p>
                    <button id="serverWakeCloseBtn" class="btn btn-primary hidden" style="margin-top: 1rem;">Fechar</button>
                </div>
            </div>
        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
